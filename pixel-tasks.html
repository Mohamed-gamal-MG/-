<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlRoot">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QUEST LOG — مهامي اليومية</title>
    <meta name="description" content="Pixel art daily task manager | مدير مهام بتصميم بكسل ريترو" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Cairo:wght@700;900&display=swap"
        rel="stylesheet" />

    <style>
        /* ════════════════════════════════════════
       RESET & BASE
    ════════════════════════════════════════ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --black: #000;
            --dark: #0a0a0a;
            --darkgray: #111;
            --green: #00ff41;
            --cyan: #00e5ff;
            --yellow: #ffe600;
            --red: #ff3c3c;
            --purple: #b54fff;
            --orange: #ff8c00;
            --white: #f0f0f0;
            --gray: #555;
            --px: 2px;
            /* pixel unit */
        }

        html {
            image-rendering: pixelated;
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background: #000;
            color: var(--green);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* SCANLINES */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 9998;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .18) 2px, rgba(0, 0, 0, .18) 4px);
        }

        /* CRT flicker */
        @keyframes flicker {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .97
            }
        }

        body {
            animation: flicker 8s infinite;
        }

        /* ════════════════════════════════════════
       STAR FIELD
    ════════════════════════════════════════ */
        .starfield {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .px-star {
            position: absolute;
            background: var(--white);
            animation: blink var(--d) step-end infinite var(--del);
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        /* ════════════════════════════════════════
       LAYOUT
    ════════════════════════════════════════ */
        .container {
            position: relative;
            z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 24px 16px 80px;
        }

        /* ════════════════════════════════════════
       PIXEL BOX — reusable card component
    ════════════════════════════════════════ */
        .px-box {
            background: #000;
            border: 4px solid var(--green);
            box-shadow:
                inset 2px 2px 0 #003b0f,
                4px 4px 0 var(--green),
                8px 8px 0 #003b0f;
            padding: 20px;
            position: relative;
            margin-bottom: 8px;
        }

        /* corner decorations */
        .px-box::before,
        .px-box::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--green);
        }

        .px-box::before {
            top: -4px;
            right: -4px;
        }

        .px-box::after {
            bottom: -4px;
            left: -4px;
        }

        /* ════════════════════════════════════════
       HEADER
    ════════════════════════════════════════ */
        .header {
            text-align: center;
            padding: 28px 16px 20px;
        }

        .pixel-sprite {
            display: block;
            margin: 0 auto 16px;
            width: 48px;
            height: 48px;
            image-rendering: pixelated;
            /* CSS pixel art character — clipboard */
            background:
                /* body */
                linear-gradient(var(--yellow) 0 100%) 8px 16px/32px 32px no-repeat,
                /* clip */
                linear-gradient(var(--gray) 0 100%) 16px 8px/16px 12px no-repeat,
                /* lines */
                linear-gradient(var(--darkgray) 0 100%) 12px 24px/24px 4px no-repeat,
                linear-gradient(var(--darkgray) 0 100%) 12px 32px/24px 4px no-repeat,
                linear-gradient(var(--darkgray) 0 100%) 12px 40px/16px 4px no-repeat;
            animation: bobble 2s steps(2) infinite;
        }

        @keyframes bobble {
            0% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-4px)
            }
        }

        .game-title {
            font-size: .8rem;
            letter-spacing: 2px;
            color: var(--cyan);
            text-shadow: 2px 2px 0 #004455, 4px 4px 0 #002233;
            animation: titleGlow 2s steps(1) infinite;
            line-height: 1.8;
        }

        @keyframes titleGlow {

            0%,
            100% {
                color: var(--cyan)
            }

            50% {
                color: var(--yellow)
            }
        }

        .game-subtitle {
            font-size: .42rem;
            color: var(--green);
            margin-top: 10px;
            letter-spacing: 1px;
            opacity: .7;
        }

        /* BLINK cursor */
        .blink {
            animation: cursorBlink .8s step-end infinite;
        }

        @keyframes cursorBlink {
            50% {
                opacity: 0
            }
        }

        /* ════════════════════════════════════════
       TOP BAR (date / time / lang / sound)
    ════════════════════════════════════════ */
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .dt-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .dt-line {
            font-size: .38rem;
            color: var(--cyan);
            letter-spacing: 1px;
        }

        .ctrl-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* pixel button */
        .px-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: .38rem;
            background: #000;
            color: var(--green);
            border: 3px solid var(--green);
            padding: 6px 10px;
            cursor: pointer;
            transition: none;
            position: relative;
            box-shadow: 3px 3px 0 var(--green);
            white-space: nowrap;
            letter-spacing: 1px;
        }

        .px-btn:hover {
            background: var(--green);
            color: #000;
            box-shadow: none;
            transform: translate(3px, 3px);
        }

        .px-btn:active {
            transform: translate(3px, 3px);
            box-shadow: none;
        }

        .px-btn.cyan {
            color: var(--cyan);
            border-color: var(--cyan);
            box-shadow: 3px 3px 0 var(--cyan);
        }

        .px-btn.cyan:hover {
            background: var(--cyan);
            color: #000;
        }

        .px-btn.red {
            color: var(--red);
            border-color: var(--red);
            box-shadow: 3px 3px 0 var(--red);
        }

        .px-btn.red:hover {
            background: var(--red);
            color: #000;
        }

        .px-btn.muted {
            opacity: .4;
        }

        /* ════════════════════════════════════════
       HP BAR (Progress)
    ════════════════════════════════════════ */
        .hp-section {
            margin-bottom: 16px;
        }

        .hp-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .hp-label {
            font-size: .4rem;
            color: var(--yellow);
            letter-spacing: 1px;
        }

        .hp-pct {
            font-size: .5rem;
            color: var(--white);
        }

        .hp-track {
            height: 20px;
            background: #111;
            border: 3px solid var(--green);
            box-shadow: inset 2px 2px 0 #001a06;
            position: relative;
            overflow: hidden;
        }

        .hp-fill {
            height: 100%;
            width: 0%;
            background: repeating-linear-gradient(90deg, var(--green) 0 6px, #00cc35 6px 12px);
            transition: width .5s steps(10);
            position: relative;
        }

        /* EXP bar glint */
        .hp-fill::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, .25) 0 8px, transparent 8px);
        }

        /* ════════════════════════════════════════
       ADD FORM
    ════════════════════════════════════════ */
        .add-section {
            margin-bottom: 20px;
        }

        .add-section-title {
            font-size: .45rem;
            color: var(--yellow);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .add-section-title::before {
            content: '► ';
        }

        .add-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .px-input {
            flex: 1;
            min-width: 160px;
            font-family: 'Press Start 2P', monospace;
            font-size: .38rem;
            background: #000;
            color: var(--green);
            border: 3px solid var(--green);
            padding: 8px 10px;
            outline: none;
            caret-color: var(--green);
            box-shadow: inset 2px 2px 0 #001a06;
            letter-spacing: 1px;
        }

        .px-input::placeholder {
            color: #00882b;
            opacity: .6;
        }

        .px-input:focus {
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .px-select {
            font-family: 'Press Start 2P', monospace;
            font-size: .35rem;
            background: #000;
            color: var(--yellow);
            border: 3px solid var(--yellow);
            padding: 8px;
            cursor: pointer;
            outline: none;
            box-shadow: inset 2px 2px 0 #2a1c00;
            flex-shrink: 0;
        }

        .px-select option {
            background: #111;
            color: var(--yellow);
        }

        /* emoji row */
        .emoji-row {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .emoji-label {
            font-size: .35rem;
            color: var(--gray);
        }

        .emoji-btn {
            border: 2px solid #333;
            background: #000;
            font-size: .9rem;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: none;
            image-rendering: pixelated;
        }

        .emoji-btn:hover,
        .emoji-btn.active {
            border-color: var(--cyan);
            background: #001a22;
            box-shadow: 2px 2px 0 var(--cyan);
        }

        /* ════════════════════════════════════════
       QUEST LIST
    ════════════════════════════════════════ */
        .quest-title {
            font-size: .45rem;
            color: var(--yellow);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .quest-title::before {
            content: '► ';
        }

        .task-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* EMPTY STATE */
        .empty-state {
            display: none;
            text-align: center;
            padding: 32px 16px;
            border: 3px dashed #333;
        }

        .empty-icon {
            font-size: 2rem;
            display: block;
            margin-bottom: 12px;
            opacity: .3;
        }

        .empty-text {
            font-size: .38rem;
            color: #555;
            line-height: 2;
        }

        /* TASK ITEM */
        .task-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #000;
            border: 3px solid #003b0f;
            padding: 10px 12px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: none;
        }

        .task-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--green);
        }

        .task-item:hover {
            border-color: var(--green);
            background: #001a06;
            box-shadow: 3px 3px 0 var(--green);
        }

        .task-item:hover::before {
            background: var(--yellow);
        }

        .task-item.done {
            border-color: #003300;
            background: #000500;
        }

        .task-item.done::before {
            background: #333;
        }

        .task-item.done .task-text {
            text-decoration: line-through;
            color: #333;
        }

        .task-item.done .task-num {
            background: #222;
            color: #333;
            border-color: #333;
        }

        /* priority side bar */
        .task-item.ph::before {
            background: var(--red);
        }

        .task-item.pm::before {
            background: var(--yellow);
        }

        .task-item.pl::before {
            background: var(--green);
        }

        .drag-handle {
            font-size: .6rem;
            color: #333;
            cursor: grab;
            flex-shrink: 0;
        }

        .task-item:hover .drag-handle {
            color: #666;
        }

        .task-num {
            width: 22px;
            height: 22px;
            background: var(--green);
            color: #000;
            font-size: .35rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            image-rendering: pixelated;
        }

        .task-item.done .task-num {
            background: #222;
            color: #444;
        }

        .task-emoji {
            font-size: 1rem;
            flex-shrink: 0;
            image-rendering: pixelated;
        }

        .task-text {
            flex: 1;
            font-size: .4rem;
            color: var(--green);
            letter-spacing: 1px;
            line-height: 1.8;
            word-break: break-word;
        }

        /* priority tag */
        .ptag {
            font-size: .3rem;
            padding: 3px 6px;
            flex-shrink: 0;
            border: 2px solid;
            letter-spacing: 1px;
        }

        .ptag-h {
            color: var(--red);
            border-color: var(--red);
        }

        .ptag-m {
            color: var(--yellow);
            border-color: var(--yellow);
        }

        .ptag-l {
            color: var(--green);
            border-color: var(--green);
        }

        /* check box */
        .check-px {
            width: 22px;
            height: 22px;
            border: 3px solid #00882b;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .5rem;
            color: var(--green);
            flex-shrink: 0;
        }

        .task-item.done .check-px {
            background: var(--green);
            color: #000;
        }

        /* delete btn */
        .del-btn {
            width: 22px;
            height: 22px;
            background: #000;
            border: 2px solid #330000;
            color: #550000;
            font-size: .5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-family: 'Press Start 2P', monospace;
        }

        .del-btn:hover {
            background: var(--red);
            color: #000;
            border-color: var(--red);
        }

        /* ════════════════════════════════════════
       STATS ROW
    ════════════════════════════════════════ */
        .stats-row {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .stat-box {
            flex: 1;
            background: #000;
            border: 3px solid #003b0f;
            padding: 10px 6px;
            text-align: center;
        }

        .stat-num {
            font-size: .75rem;
            display: block;
            color: var(--cyan);
            text-shadow: 2px 2px 0 #004455;
        }

        .stat-num.g {
            color: var(--green);
            text-shadow: 2px 2px 0 #003b0f;
        }

        .stat-num.y {
            color: var(--yellow);
            text-shadow: 2px 2px 0 #2a1c00;
        }

        .stat-label {
            font-size: .3rem;
            color: #555;
            margin-top: 4px;
            display: block;
            letter-spacing: 1px;
        }

        /* ════════════════════════════════════════
       FOOTER BUTTONS
    ════════════════════════════════════════ */
        .footer {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* ════════════════════════════════════════
       CELEBRATION BANNER
    ════════════════════════════════════════ */
        .celebration {
            font-size: .38rem;
            text-align: center;
            letter-spacing: 2px;
            min-height: 28px;
            padding: 8px;
            border: 3px solid transparent;
            opacity: 0;
            transition: opacity .3s;
            line-height: 2;
        }

        .celebration.show {
            opacity: 1;
        }

        .cel-fw {
            color: var(--yellow);
            border-color: var(--yellow);
            animation: cfw .5s steps(2) infinite alternate;
        }

        .cel-gd {
            color: var(--orange);
            border-color: var(--orange);
            animation: cfw .6s steps(2) infinite alternate;
        }

        .cel-rb {
            animation: crb .4s steps(1) infinite;
        }

        .cel-np {
            color: var(--purple);
            border-color: var(--purple);
            animation: cnp .3s steps(2) infinite alternate;
        }

        .cel-sn {
            color: var(--cyan);
            border-color: var(--cyan);
            animation: csn 1s steps(2) infinite alternate;
        }

        @keyframes cfw {
            from {
                text-shadow: 2px 2px 0 #664400
            }

            to {
                text-shadow: 0 0 8px var(--yellow), 4px 4px 0 #664400
            }
        }

        @keyframes crb {
            0% {
                color: var(--red)
            }

            25% {
                color: var(--yellow)
            }

            50% {
                color: var(--green)
            }

            75% {
                color: var(--cyan)
            }

            100% {
                color: var(--purple)
            }
        }

        @keyframes cnp {
            from {
                text-shadow: 2px 2px 0 #440066
            }

            to {
                text-shadow: 0 0 12px var(--purple)
            }
        }

        @keyframes csn {
            from {
                letter-spacing: 2px
            }

            to {
                letter-spacing: 4px
            }
        }

        /* ════════════════════════════════════════
       PARTICLES
    ════════════════════════════════════════ */
        .px-particle {
            position: fixed;
            pointer-events: none;
            z-index: 9997;
            image-rendering: pixelated;
            animation: pfall var(--dur) steps(20) forwards;
        }

        @keyframes pfall {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 1
            }

            100% {
                transform: translate(var(--tx), 100vh) rotate(var(--rot));
                opacity: 0
            }
        }

        /* SCREEN FLASH */
        .px-flash {
            position: fixed;
            inset: 0;
            z-index: 9996;
            pointer-events: none;
            animation: pxflash .4s steps(4) forwards;
        }

        @keyframes pxflash {
            0% {
                opacity: .7
            }

            100% {
                opacity: 0
            }
        }

        /* RIPPLE */
        .px-ripple {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--green);
            pointer-events: none;
            animation: pxrip .4s steps(4) forwards;
            z-index: 10;
        }

        @keyframes pxrip {
            to {
                transform: scale(6);
                opacity: 0
            }
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #000;
            border: 3px solid var(--green);
            font-size: .38rem;
            color: var(--green);
            padding: 10px 20px;
            z-index: 9999;
            pointer-events: none;
            white-space: nowrap;
            letter-spacing: 1px;
            opacity: 0;
            transition: transform .2s steps(4), opacity .2s;
            box-shadow: 4px 4px 0 var(--green);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* DRAGGING */
        .task-item.dragging {
            opacity: .3;
        }

        .task-item.drag-over {
            border-color: var(--cyan);
            background: #001a22;
        }

        /* REMOVING */
        .task-item.removing {
            animation: rmv .25s steps(5) forwards;
        }

        @keyframes rmv {
            to {
                opacity: 0;
                transform: translateX(40px);
            }
        }

        /* POP */
        .task-item.pop {
            animation: taskpop .3s steps(3) both;
        }

        @keyframes taskpop {
            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.04)
            }

            100% {
                transform: scale(1)
            }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
            border-left: 2px solid #111;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--green);
            border: 2px solid #000;
        }

        /* RESPONSIVE */
        @media(max-width:520px) {
            .game-title {
                font-size: .6rem;
            }

            .px-input {
                min-width: 100px;
            }

            .stat-num {
                font-size: .55rem;
            }
        }
    </style>
</head>

<body>

    <!-- Star field -->
    <div class="starfield" id="starfield"></div>

    <div class="container">

        <!-- ── HEADER ── -->
        <div class="header">
            <canvas class="pixel-sprite" id="sprite" width="48" height="48"></canvas>
            <div class="game-title" id="gameTitle">QUEST LOG<br>▓▓ مهامي اليومية ▓▓</div>
            <div class="game-subtitle" id="gameSubtitle">نظّم يومك كأنك في لعبة ✦ Level up your life<span
                    class="blink">_</span></div>
        </div>

        <!-- ── TOP BAR ── -->
        <div class="topbar">
            <div class="dt-row">
                <div class="dt-line" id="dateDisplay">...</div>
                <div class="dt-line" id="timeDisplay">...</div>
            </div>
            <div class="ctrl-row">
                <button class="px-btn cyan" id="langBtn" onclick="toggleLang()">
                    <span id="langFlag">🇺🇸</span> <span id="langLabel">EN</span>
                </button>
                <button class="px-btn" id="soundBtn">♪ ON</button>
            </div>
        </div>

        <!-- ── HP BAR ── -->
        <div class="px-box hp-section">
            <div class="hp-header">
                <span class="hp-label">QUEST PROGRESS <span id="progressLabel"></span></span>
                <span class="hp-pct" id="progressPct">0%</span>
            </div>
            <div class="hp-track">
                <div class="hp-fill" id="progressBar"></div>
            </div>
        </div>

        <!-- ── ADD TASK ── -->
        <div class="px-box add-section">
            <div class="add-section-title" data-i18n="addTitle"></div>
            <div class="add-row">
                <input class="px-input" id="taskInput" type="text" maxlength="60" autocomplete="off"
                    onkeydown="if(event.key==='Enter')addTask()" />
                <select class="px-select" id="prioritySelect">
                    <option value="high" data-i18n="prioHigh"></option>
                    <option value="medium" selected data-i18n="prioMedium"></option>
                    <option value="low" data-i18n="prioLow"></option>
                </select>
                <button class="px-btn" onclick="addTask()" data-i18n="addBtn"></button>
            </div>
            <div class="emoji-row">
                <span class="emoji-label" data-i18n="pickEmoji"></span>
                <button class="emoji-btn active" onclick="selEmoji(this,'⚔️')">⚔️</button>
                <button class="emoji-btn" onclick="selEmoji(this,'🛡️')">🛡️</button>
                <button class="emoji-btn" onclick="selEmoji(this,'🏆')">🏆</button>
                <button class="emoji-btn" onclick="selEmoji(this,'💎')">💎</button>
                <button class="emoji-btn" onclick="selEmoji(this,'🗡️')">🗡️</button>
                <button class="emoji-btn" onclick="selEmoji(this,'🧹')">🧹</button>
                <button class="emoji-btn" onclick="selEmoji(this,'🚿')">🚿</button>
                <button class="emoji-btn" onclick="selEmoji(this,'👕')">👕</button>
                <button class="emoji-btn" onclick="selEmoji(this,'📅')">📅</button>
                <button class="emoji-btn" onclick="selEmoji(this,'🌟')">🌟</button>
                <button class="emoji-btn" onclick="selEmoji(this,'🔥')">🔥</button>
                <button class="emoji-btn" onclick="selEmoji(this,'💡')">💡</button>
            </div>
        </div>

        <!-- ── QUEST LIST ── -->
        <div class="px-box">
            <div class="quest-title" data-i18n="questTitle"></div>
            <ul class="task-list" id="taskList"></ul>
            <div class="empty-state" id="emptyState">
                <span class="empty-icon">🗡️</span>
                <div class="empty-text" data-i18n="emptyState"></div>
            </div>
        </div>

        <!-- ── STATS ── -->
        <div class="stats-row">
            <div class="stat-box">
                <span class="stat-num" id="statTotal">0</span>
                <span class="stat-label" data-i18n="statTotal"></span>
            </div>
            <div class="stat-box">
                <span class="stat-num g" id="statDone">0</span>
                <span class="stat-label" data-i18n="statDone"></span>
            </div>
            <div class="stat-box">
                <span class="stat-num y" id="statRem">0</span>
                <span class="stat-label" data-i18n="statRem"></span>
            </div>
        </div>

        <!-- ── FOOTER ── -->
        <div class="footer">
            <div class="btn-row">
                <button class="px-btn cyan" onclick="completeAll()" data-i18n="btnAll"></button>
                <button class="px-btn" onclick="resetAll()" data-i18n="btnReset"></button>
                <button class="px-btn red" onclick="clearDone()" data-i18n="btnClear"></button>
            </div>
            <div class="celebration" id="celebration"></div>
        </div>

    </div><!-- /container -->

    <div class="toast" id="toast"></div>

    <!-- ══════════════════════════════════════════════════════
     SCRIPT
══════════════════════════════════════════════════════ -->
    <script>
        /* ─── i18n ─────────────────────────────────────────── */
        const S = {
            ar: {
                gameTitle: 'QUEST LOG\n▓▓ مهامي اليومية ▓▓',
                gameSubtitle: 'نظّم يومك كأنك في لعبة ✦ Level up your life',
                addTitle: '+ أضف مهمة جديدة',
                inputPlaceholder: 'اكتب اسم المهمة...',
                prioHigh: '★★★ عالي', prioMedium: '★★☆ متوسط', prioLow: '★☆☆ منخفض',
                addBtn: '+ أضف', pickEmoji: 'أيقونة:',
                questTitle: 'قائمة المهام',
                emptyState: 'لا مهام — أضف أول مهمة!',
                statTotal: 'المهام', statDone: 'مكتملة', statRem: 'متبقية',
                btnAll: '✔ أكمل الكل', btnReset: '↺ إعادة', btnClear: '✖ احذف المكتملة',
                progressOf: (d, t) => `${d}/${t} مهام`,
                celebrations: [
                    '★ يا سلام! كملت كل المهام! ★',
                    '♛ أحسنت يا بطل! LEVEL UP! ♛',
                    '♦ ماشاء الله! QUEST COMPLETE! ♦',
                    '♥ رهيب! YOU WIN! ♥',
                    '✦ برافو! PERFECT RUN! ✦',
                ],
                toastAdded: '[ + مهمة جديدة ]', toastDeleted: '[ - حذف مهمة ]',
                toastClearDone: '[ ✖ حذف المكتملة ]', toastReset: '[ ↺ إعادة تعيين ]',
                toastNoDone: '[ ! لا مهام مكتملة ]',
                pHigh: 'HIGH', pMedium: 'MED', pLow: 'LOW',
                langLabel: 'EN', langFlag: '🇺🇸', pageTitle: 'QUEST LOG — مهامي اليومية',
                progLabel: (d, t) => `${d}/${t}`,
            },
            en: {
                gameTitle: 'QUEST LOG\n▓▓ MY DAILY TASKS ▓▓',
                gameSubtitle: 'Organize your day like a game ✦',
                addTitle: '+ NEW QUEST',
                inputPlaceholder: 'Enter quest name...',
                prioHigh: '★★★ HIGH', prioMedium: '★★☆ MED', prioLow: '★☆☆ LOW',
                addBtn: '+ ADD', pickEmoji: 'ICON:',
                questTitle: 'ACTIVE QUESTS',
                emptyState: 'NO QUESTS — ADD YOUR FIRST ONE!',
                statTotal: 'TOTAL', statDone: 'DONE', statRem: 'LEFT',
                btnAll: '✔ ALL DONE', btnReset: '↺ RESET', btnClear: '✖ CLEAR DONE',
                progressOf: (d, t) => `${d}/${t} TASKS`,
                celebrations: [
                    '★ AWESOME! ALL QUESTS DONE! ★',
                    '♛ HERO! YOU LEVELED UP! ♛',
                    '♦ INCREDIBLE! QUEST COMPLETE! ♦',
                    '♥ WINNER! YOU WIN! ♥',
                    '✦ PERFECT! FLAWLESS RUN! ✦',
                ],
                toastAdded: '[ + QUEST ADDED ]', toastDeleted: '[ - QUEST REMOVED ]',
                toastClearDone: '[ ✖ CLEARED DONE ]', toastReset: '[ ↺ RESET ALL ]',
                toastNoDone: '[ ! NO DONE TASKS ]',
                pHigh: 'HIGH', pMedium: 'MED', pLow: 'LOW',
                langLabel: 'AR', langFlag: '🇸🇦', pageTitle: 'QUEST LOG — MY DAILY TASKS',
                progLabel: (d, t) => `${d}/${t}`,
            }
        };

        let lang = localStorage.getItem('pxLang') || 'ar';
        function t(k, ...a) { const v = S[lang][k]; return typeof v === 'function' ? v(...a) : v; }

        function applyLang() {
            const isAr = lang === 'ar';
            const root = document.getElementById('htmlRoot');
            root.setAttribute('lang', lang); root.setAttribute('dir', isAr ? 'rtl' : 'ltr');
            document.title = t('pageTitle');
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const k = el.dataset.i18n; if (S[lang][k] && typeof S[lang][k] !== 'function') el.textContent = t(k);
            });
            document.getElementById('taskInput').placeholder = t('inputPlaceholder');
            const sel = document.getElementById('prioritySelect');
            sel.options[0].text = t('prioHigh'); sel.options[1].text = t('prioMedium'); sel.options[2].text = t('prioLow');
            document.getElementById('langLabel').textContent = t('langLabel');
            document.querySelector('#langBtn .lang-flag') || 0;
            document.getElementById('langFlag').textContent = t('langFlag');
            localStorage.setItem('pxLang', lang);
            updateProgress(); render();
        }

        function toggleLang() {
            lang = lang === 'ar' ? 'en' : 'ar';
            const b = document.getElementById('langBtn');
            b.style.transform = 'scale(.9)'; setTimeout(() => b.style.transform = '', 150);
            playChip('beep'); applyLang();
        }

        /* ─── Stars ──────────────────────────────────────────── */
        (() => {
            const c = document.getElementById('starfield');
            for (let i = 0; i < 120; i++) {
                const s = document.createElement('div'); s.className = 'px-star';
                const sz = Math.random() > .7 ? 2 : 1;
                s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random() * 100}%;left:${Math.random() * 100}%;--d:${(Math.random() * 3 + 1).toFixed(1)}s;--del:-${(Math.random() * 3).toFixed(1)}s`;
                c.appendChild(s);
            }
        })();

        /* ─── Pixel sprite canvas ────────────────────────────── */
        (() => {
            const cv = document.getElementById('sprite'), ctx = cv.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            // draw simple pixel sword icon
            const G = '#00ff41', Y = '#ffe600', GR = '#555', N = 'transparent';
            const px = [[N, N, N, N, N, N, N, Y, N, N, N, N],
            [N, N, N, N, N, N, Y, Y, Y, N, N, N],
            [N, N, N, N, N, Y, Y, G, Y, Y, N, N],
            [N, N, N, N, Y, Y, G, G, G, Y, Y, N],
            [N, N, N, Y, Y, G, G, G, G, G, Y, N],
            [N, N, Y, Y, G, G, G, G, G, G, N, N],
            [N, Y, Y, G, G, G, G, G, G, N, N, N],
            [Y, Y, G, G, G, G, G, G, N, N, N, N],
            [Y, G, G, G, G, G, G, N, N, N, N, N],
            [G, G, G, G, G, N, GR, N, N, N, N, N],
            [N, G, G, G, N, GR, GR, GR, N, N, N, N],
            [N, N, G, N, N, N, GR, N, N, N, N, N]];
            const size = 4;
            px.forEach((row, y) => row.forEach((col, x) => {
                if (col === N) return;
                ctx.fillStyle = col; ctx.fillRect(x * size, y * size, size, size);
            }));
        })();

        /* ─── Clock ──────────────────────────────────────────── */
        function updateClock() {
            const n = new Date();
            const daysAr = ['الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
            const daysEn = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const monAr = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
            const monEn = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            const h = n.getHours(), m = n.getMinutes(), s = n.getSeconds();
            if (lang === 'ar') {
                document.getElementById('dateDisplay').textContent = `📅 ${daysAr[n.getDay()]} ${n.getDate()} ${monAr[n.getMonth()]}`;
                document.getElementById('timeDisplay').textContent = `⏰ ${h % 12 || 12}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')} ${h >= 12 ? 'م' : 'ص'}`;
            } else {
                document.getElementById('dateDisplay').textContent = `📅 ${daysEn[n.getDay()]} ${monEn[n.getMonth()]} ${n.getDate()}`;
                document.getElementById('timeDisplay').textContent = `⏰ ${String(h % 12 || 12).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')} ${h >= 12 ? 'PM' : 'AM'}`;
            }
        }
        updateClock(); setInterval(updateClock, 1000);

        /* ─── Audio (Chiptune) ───────────────────────────────── */
        let actx = null, soundOn = true;
        function ac() { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); return actx; }

        function chip(freq, t, dur, type = 'square', vol = .1) {
            try {
                const c = ac(), o = c.createOscillator(), g = c.createGain();
                o.connect(g); g.connect(c.destination);
                o.type = type; o.frequency.setValueAtTime(freq, c.currentTime + t);
                g.gain.setValueAtTime(vol, c.currentTime + t);
                g.gain.linearRampToValueAtTime(0, c.currentTime + t + dur);
                o.start(c.currentTime + t); o.stop(c.currentTime + t + dur + .01);
            } catch { }
        }

        const CHIPS = {
            check: () => { if (!soundOn) return;[[330, .0], [440, .08], [550, .16], [660, .24]].forEach(([f, t]) => chip(f, t, .12)); },
            uncheck: () => { if (!soundOn) return; chip(440, 0, .08); chip(330, .1, .12); },
            add: () => { if (!soundOn) return; chip(220, 0, .05); chip(440, .07, .1); },
            del: () => { if (!soundOn) return; chip(440, 0, .05, 'sawtooth', .08); chip(220, .07, .1, 'sawtooth', .06); },
            reset: () => { if (!soundOn) return;[[500, .0], [400, .08], [300, .16], [200, .24]].forEach(([f, t]) => chip(f, t, .1, 'triangle', .07)); },
            beep: () => { if (!soundOn) return; chip(600, 0, .06); chip(800, .08, .06); },
            cel0: () => [[262, .0], [330, .1], [392, .2], [524, .3], [660, .44], [784, .58], [1047, .72]].forEach(([f, t]) => chip(f, t, .2)),
            cel1: () => [[784, .0], [784, .1], [1047, .2], [784, .3], [880, .4], [1047, .56], [1319, .7]].forEach(([f, t]) => chip(f, t, .18, 'square', .12)),
            cel2: () => [[262, .0], [330, .1], [392, .2], [330, .3], [262, .4], [392, .5], [524, .64]].forEach(([f, t]) => chip(f, t, .15, 'triangle', .1)),
            cel3: () => [[880, .0], [660, .08], [880, .16], [1047, .24], [660, .34], [880, .44], [1047, .56], [1319, .7]].forEach(([f, t]) => chip(f, t, .14)),
            cel4: () => [[523, .0], [392, .12], [330, .24], [262, .36], [392, .5], [523, .64], [659, .8]].forEach(([f, t]) => chip(f, t, .2, 'sine', .09)),
        };

        const soundBtn = document.getElementById('soundBtn');
        soundBtn.addEventListener('click', function () {
            soundOn = !soundOn;
            this.textContent = soundOn ? '♪ ON' : '♪ OFF';
            this.classList.toggle('muted', !soundOn);
            if (soundOn) CHIPS.beep();
        });

        /* ─── Toast ──────────────────────────────────────────── */
        let toastT;
        function toast(msg) {
            const el = document.getElementById('toast');
            el.textContent = msg; el.classList.add('show');
            clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2000);
        }

        /* ─── Pixel Particles ────────────────────────────────── */
        const CEL_MODES = [
            {
                cls: 'cel-fw', flash: 'rgba(255,230,0,.25)', chip: 'cel0',
                colors: ['#ffe600', '#ff8c00', '#fff', '#ff3c3c', '#00e5ff'], shapes: ['square', 'sq']
            },
            {
                cls: 'cel-gd', flash: 'rgba(255,140,0,.2)', chip: 'cel1',
                colors: ['#ff8c00', '#ffe600', '#ffd080', '#ffb020'], shapes: ['square']
            },
            {
                cls: 'cel-rb', flash: 'rgba(0,229,255,.15)', chip: 'cel2',
                colors: ['#ff3c3c', '#ffe600', '#00ff41', '#00e5ff', '#b54fff'], shapes: ['circle', 'square']
            },
            {
                cls: 'cel-np', flash: 'rgba(181,79,255,.25)', chip: 'cel3',
                colors: ['#b54fff', '#00e5ff', '#ff3c3c', '#ffe600'], shapes: ['square']
            },
            {
                cls: 'cel-sn', flash: 'rgba(0,229,255,.2)', chip: 'cel4',
                colors: ['#fff', '#00e5ff', '#aaf', 'rgba(255,255,255,.6)'], shapes: ['circle']
            },
        ];

        function spawnPixelParticles(mode) {
            const m = CEL_MODES[mode];
            const n = mode === 4 ? 60 : 70;
            for (let i = 0; i < n; i++) {
                const p = document.createElement('div'); p.className = 'px-particle';
                const sz = Math.random() > 0.5 ? 8 : 4;
                const col = m.colors[Math.floor(Math.random() * m.colors.length)];
                const br = m.shapes[Math.floor(Math.random() * m.shapes.length)] === 'circle' ? '50%' : '0';
                const tx = (Math.random() - 0.5) * 200;
                const rot = Math.random() * 360;
                p.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random() * 100}vw;top:-10px;` +
                    `background:${col};border-radius:${br};--dur:${(Math.random() * 1.2 + 0.6).toFixed(2)}s;` +
                    `--tx:${tx}px;--rot:${rot}deg;animation-delay:${(Math.random() * 0.5).toFixed(2)}s;`;
                document.body.appendChild(p); setTimeout(() => p.remove(), 2500);
            }
        }

        function flashScreen(col) {
            const f = document.createElement('div'); f.className = 'px-flash';
            f.style.background = col; document.body.appendChild(f); setTimeout(() => f.remove(), 500);
        }

        /* ─── Ripple ─────────────────────────────────────────── */
        function pixelRipple(el, e) {
            const r = el.getBoundingClientRect();
            const x = e.clientX - r.left - 4, y = e.clientY - r.top - 4;
            const rp = document.createElement('div'); rp.className = 'px-ripple';
            rp.style.cssText = `left:${x}px;top:${y}px`;
            el.appendChild(rp); setTimeout(() => rp.remove(), 450);
        }

        /* ─── Data ───────────────────────────────────────────── */
        const DEFAULT = [
            { id: 1, text: 'نظف الأوضة', emoji: '🧹', priority: 'high', done: false },
            { id: 2, text: 'استحمّ', emoji: '🚿', priority: 'high', done: false },
            { id: 3, text: 'اغسل اللبس', emoji: '👕', priority: 'medium', done: false },
            { id: 4, text: 'اعمل خطة لحياتك', emoji: '⚔️', priority: 'high', done: false },
            { id: 5, text: 'النهارده تخطيط', emoji: '📅', priority: 'medium', done: false },
        ];
        let tasks = [], nextId = 100, selEmoji_val = '⚔️', dragSrc = null;

        function load() {
            try {
                const s = localStorage.getItem('pxTasks');
                if (s) { const d = JSON.parse(s); tasks = d.tasks; nextId = d.nextId || 100; }
                else { tasks = JSON.parse(JSON.stringify(DEFAULT)); nextId = 100; }
            } catch { tasks = JSON.parse(JSON.stringify(DEFAULT)); nextId = 100; }
        }
        function save() { localStorage.setItem('pxTasks', JSON.stringify({ tasks, nextId })); }

        function selEmoji(btn, e) {
            document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); selEmoji_val = e;
        }

        /* ─── Add ────────────────────────────────────────────── */
        function addTask() {
            const inp = document.getElementById('taskInput');
            const text = inp.value.trim();
            if (!text) {
                inp.style.borderColor = 'var(--red)';
                setTimeout(() => inp.style.borderColor = 'var(--green)', 600);
                chip(200, 0, .1, 'sawtooth', .08); return;
            }
            const priority = document.getElementById('prioritySelect').value;
            tasks.push({ id: nextId++, text, emoji: selEmoji_val, priority, done: false });
            save(); inp.value = ''; render(); CHIPS.add(); toast(t('toastAdded'));
        }

        /* ─── Toggle ─────────────────────────────────────────── */
        function toggleTask(id, event) {
            const tk = tasks.find(t => t.id === id); if (!tk) return;
            const el = document.querySelector(`[data-id="${id}"]`);
            if (el) pixelRipple(el, event);
            tk.done = !tk.done;
            if (tk.done) {
                el.classList.add('done', 'pop'); el.querySelector('.check-px').textContent = '✓'; CHIPS.check();
            } else {
                el.classList.remove('done'); el.classList.add('pop'); el.querySelector('.check-px').textContent = ''; CHIPS.uncheck();
            }
            save(); updateProgress();
        }

        /* ─── Delete ─────────────────────────────────────────── */
        function deleteTask(id) {
            const el = document.querySelector(`[data-id="${id}"]`);
            if (!el) return;
            el.classList.add('removing'); CHIPS.del();
            setTimeout(() => { tasks = tasks.filter(tk => tk.id !== id); save(); render(); toast(t('toastDeleted')); }, 280);
        }

        /* ─── Priority tag ───────────────────────────────────── */
        function ptag(p) {
            const cls = p === 'high' ? 'ptag-h' : p === 'medium' ? 'ptag-m' : 'ptag-l';
            const lbl = p === 'high' ? t('pHigh') : p === 'medium' ? t('pMedium') : t('pLow');
            return `<span class="ptag ${cls}">${lbl}</span>`;
        }
        function phCls(p) { return p === 'high' ? 'ph' : p === 'medium' ? 'pm' : 'pl'; }

        /* ─── Render ─────────────────────────────────────────── */
        function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        function render() {
            const list = document.getElementById('taskList');
            const empty = document.getElementById('emptyState');
            const eText = empty.querySelector('[data-i18n="emptyState"]');
            if (eText) eText.textContent = t('emptyState');
            if (tasks.length === 0) { list.innerHTML = ''; empty.style.display = 'block'; updateProgress(); return; }
            empty.style.display = 'none';

            list.innerHTML = tasks.map((tk, i) => `
    <li class="task-item ${phCls(tk.priority)}${tk.done ? ' done' : ''}"
        data-id="${tk.id}" draggable="true"
        onclick="toggleTask(${tk.id},event)">
      <span class="drag-handle" onclick="event.stopPropagation()">≡</span>
      <div class="task-num">${i + 1}</div>
      <span class="task-emoji">${tk.emoji}</span>
      <span class="task-text">${esc(tk.text)}</span>
      ${ptag(tk.priority)}
      <div class="check-px">${tk.done ? '✓' : ''}</div>
      <button class="del-btn" onclick="event.stopPropagation();deleteTask(${tk.id})" title="delete">✖</button>
    </li>`).join('');

            // Drag & drop
            list.querySelectorAll('.task-item').forEach(el => {
                el.addEventListener('dragstart', e => { dragSrc = el; el.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
                el.addEventListener('dragend', () => { el.classList.remove('dragging', 'drag-over'); dragSrc = null; });
                el.addEventListener('dragover', e => { e.preventDefault(); if (dragSrc && dragSrc !== el) el.classList.add('drag-over'); });
                el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
                el.addEventListener('drop', e => {
                    e.preventDefault(); el.classList.remove('drag-over');
                    if (!dragSrc || dragSrc === el) return;
                    const si = tasks.findIndex(t => t.id === +dragSrc.dataset.id);
                    const di = tasks.findIndex(t => t.id === +el.dataset.id);
                    if (si < 0 || di < 0) return;
                    const [m] = tasks.splice(si, 1); tasks.splice(di, 0, m); save(); render();
                });
            });
            updateProgress();
        }

        /* ─── Progress ───────────────────────────────────────── */
        let lastAll = false, curCel = 0;
        function updateProgress() {
            const total = tasks.length, done = tasks.filter(tk => tk.done).length;
            const pct = total ? Math.round(done / total * 100) : 0;
            document.getElementById('progressBar').style.width = pct + '%';
            document.getElementById('progressLabel').textContent = t('progLabel', done, total);
            document.getElementById('progressPct').textContent = pct + '%';
            document.getElementById('statTotal').textContent = total;
            document.getElementById('statDone').textContent = done;
            document.getElementById('statRem').textContent = total - done;

            // HP bar color
            const bar = document.getElementById('progressBar');
            if (pct >= 100) bar.style.background = 'repeating-linear-gradient(90deg,var(--yellow) 0 6px,#886600 6px 12px)';
            else if (pct >= 50) bar.style.background = 'repeating-linear-gradient(90deg,var(--green) 0 6px,#00882b 6px 12px)';
            else bar.style.background = 'repeating-linear-gradient(90deg,var(--red) 0 6px,#880000 6px 12px)';

            const cel = document.getElementById('celebration');
            const allDone = total > 0 && done === total;
            if (allDone && !lastAll) {
                curCel = Math.floor(Math.random() * CEL_MODES.length);
                const m = CEL_MODES[curCel];
                cel.textContent = t('celebrations')[curCel];
                CEL_MODES.forEach(mx => cel.classList.remove(mx.cls));
                cel.classList.add(m.cls);
                flashScreen(m.flash);
                spawnPixelParticles(curCel);
                CHIPS[m.chip]();
            } else if (!allDone) {
                CEL_MODES.forEach(mx => cel.classList.remove(mx.cls));
            }
            cel.classList.toggle('show', allDone);
            lastAll = allDone;
        }

        /* ─── Buttons ────────────────────────────────────────── */
        function completeAll() {
            const un = tasks.filter(tk => !tk.done); if (!un.length) return;
            un.forEach((tk, i) => setTimeout(() => {
                tk.done = true; save();
                const el = document.querySelector(`[data-id="${tk.id}"]`);
                if (el) { el.classList.add('done', 'pop'); el.querySelector('.check-px').textContent = '✓'; }
                if (i === un.length - 1) updateProgress();
            }, i * 100));
            CHIPS.check();
        }
        function resetAll() { tasks.forEach(tk => tk.done = false); save(); render(); CHIPS.reset(); toast(t('toastReset')); }
        function clearDone() {
            if (!tasks.some(tk => tk.done)) { toast(t('toastNoDone')); return; }
            tasks = tasks.filter(tk => !tk.done); save(); render(); CHIPS.del(); toast(t('toastClearDone'));
        }

        /* ─── Init ───────────────────────────────────────────── */
        load();
        applyLang();
    </script>
</body>

</html>
